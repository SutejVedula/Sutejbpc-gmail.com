<!DOCTYPE html>
<html>
<head>
    <title>Return Result</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #11998e, #38ef7d);
            font-family: Arial;
            color: white;
        }

        .container {
            margin-top: 80px;
            text-align: center;
        }

        .card {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 15px;
            display: inline-block;
            min-width: 400px;
        }

        .fine {
            font-size: 22px;
            font-weight: bold;
            color: #dc3545;
        }

        .success {
            font-size: 24px;
            color: #28a745;
            margin-bottom: 15px;
        }

        .btn-home {
            margin-top: 20px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="card">

        <div class="success">✅ Book Returned Successfully!</div>

        <p><strong>Book:</strong> {{title}}</p>
        <p><strong>Total Days Used:</strong> {{days}}</p>

        <p class="fine">Fine: ₹{{fine}}</p>

        <a href="/" class="btn btn-primary btn-home">🏠 Go to Home</a>

    </div>

</div>

</body>
</html>
