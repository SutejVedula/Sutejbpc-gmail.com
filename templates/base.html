<!DOCTYPE html>
<html>
<head>
    <title>Library System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
        }

        .navbar {
            background-color: #2c3e50;
        }

        .navbar a {
            margin-right: 10px;
        }

        .card {
            border-radius: 12px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
        }

        .overdue {
            background-color: #ffcccc !important;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">

        <a class="navbar-brand text-warning" href="/">📚 Library System</a>

        <div>
            <!-- 🔥 TEXT OPTIONS INSTEAD OF ICON BUTTONS -->
            <a href="/" class="btn btn-primary">Home</a>
            <a href="/add" class="btn btn-success">Add Book</a>
            <a href="/issue" class="btn btn-warning">Issue Book</a>
            <a href="/return" class="btn btn-info">Return Book</a>
            <a href="/report" class="btn btn-dark">Report</a>
            <a href="/logout" class="btn btn-danger">Logout</a>
        </div>

    </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

</body>
</html>
