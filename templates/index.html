{% extends 'base.html' %}
{% block content %}

<div class="card p-4">
    <h3 class="mb-3"><i class="bi bi-books"></i> All Books</h3>

    <form method="GET" class="mb-3">
        <input class="form-control mb-2" name="q" placeholder="🔍 Search books...">
        <button class="btn btn-primary"><i class="bi bi-search"></i> Search</button>
    </form>

    <table class="table table-hover">
        <thead class="table-dark">
            <tr>
                <th>📖 Title</th>
                <th>✍ Author</th>
                <th>Status</th>
            </tr>
        </thead>

        <tbody>
        {% for book in books %}
            <tr>
                <td>{{book[1]}}</td>
                <td>{{book[2]}}</td>
                <td>
                    {% if book[3] == 1 %}
                        <span class="badge bg-success">Available</span>
                    {% else %}
                        <span class="badge bg-danger">Issued</span>
                    {% endif %}
                </td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
</div>

{% endblock %}
